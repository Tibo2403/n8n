name: Validate Workflows

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-workflows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-json:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate workflow exports
        run: node scripts/validate-workflows.mjs
